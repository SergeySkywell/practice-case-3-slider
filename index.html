<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайдер изображений</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <h1 class="slider__title">Галерея</h1>

        <div class="slider__viewport">
            <img id="image" class="slider__image" src="" alt="Текущее изображение">
        </div>

        <div class="slider__counter" id="counter">Изображение 1 из 5</div>

        <div class="slider__controls">
            <button class="slider__btn" id="prev" type="button">← Назад</button>
            <button class="slider__btn" id="next" type="button">Вперёд →</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
